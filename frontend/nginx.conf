server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS so `backend` resolves lazily (no startup failure if absent).
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamic sitemap from backend; robots.txt is the static file in the build.
    location = /sitemap.xml {
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Prerendered routes -> <route>/index.html; everything else -> SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
