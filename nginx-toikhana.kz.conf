# Production config: serves the built + prerendered frontend statically.
# Build with `cd frontend && npm run build`, then deploy the `frontend/dist`
# folder to the `root` path below. This replaces proxying `/` to a Vite dev
# server (see nginx-toikhan.kz.conf) — required for the SSG/prerendered pages
# (/, /about, /contacts, /blog, /add-toikhana, /login, /register) to be served.
server {
    listen 80;
    listen [::]:80;
    server_name toikhana.kz www.toikhana.kz;

    client_max_body_size 100M;

    # Path where the contents of frontend/dist are deployed.
    root /var/www/toikhana/dist;
    index index.html;

    # API and uploads go to the Spring Boot backend.
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # sitemap.xml is generated dynamically by the backend; robots.txt is static in dist.
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Prerendered routes resolve to <route>/index.html; everything else
    # falls back to the SPA shell for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
